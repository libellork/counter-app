services:
  web:
    build: .
    ports:
      - "${HOST_PORT}:5000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data

volumes:
  redis-data: